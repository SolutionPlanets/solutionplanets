site:
  name: Solution Planets
  site: 'https://www.solutionplanets.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: 'eWz3LsxPkdbG6vF958kpGy9LioUhBUby_fW4K0E8IDc'

# Default SEO metadata
metadata:
  title:
    default: Solution Planets
    template: '%s — Solution Planets'
  description: "\U0001F680 IT partner providing web development, design, and marketing solutions for small and medium businesses to grow online in India and USA."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Solution Planets
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: ''
    site: 'I'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr
  languages:
    en:
      label: 'English'
      flag: '🇺🇸'
    es:
      label: 'Español'
      flag: '🇪🇸'
    hi:
      label: 'हिन्दी'
      flag: '🇮🇳'
  defaultLanguage: en

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: "G-7FRR48JFJM"

ui:
  theme: 'dark:only' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
